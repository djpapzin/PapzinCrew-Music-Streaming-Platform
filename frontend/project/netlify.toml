[build]
  command = "npm ci && npm run build"
  publish = "dist"

# Proxy API requests to the live backend so the browser stays same-origin on Netlify.
[[redirects]]
  from = "/api/*"
  to = "http://13.48.27.192/:splat"
  status = 200
  force = true

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
