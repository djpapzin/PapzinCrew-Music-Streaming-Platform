services:
  # PostgreSQL Database
  - type: pgsql
    name: papzincrew-db
    databaseName: papzincrew_music
    databaseUser: papzincrew_user
    plan: free

  # Backend API Service
  - type: web
    name: papzincrew-api
    env: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: bash -lc "alembic upgrade head || echo 'alembic upgrade failed; continuing startup'; uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /ready
    autoDeploy: true
    envVars:
      # Database connection - swap between Render Postgres and Neon
      # === RENDER POSTGRES (currently active) ===
      # - key: DATABASE_URL
      #   fromDatabase:
      #     name: papzincrew-db
      #     property: connectionString
      # === NEON (uncomment when ready) ===
      - key: DATABASE_URL
        value: "postgresql://neondb_owner:npg_An0WhyEaBC6r@ep-royal-rice-ak2mosuj-pooler.c-3.us-west-2.aws.neon.tech:5432/neondb?sslmode=require&channel_binding=require"
      - key: DB_SSLMODE
        value: "require"
      # Explicit Python version
      - key: PYTHON_VERSION
        value: "3.12.5"
      # Backblaze B2 Storage Configuration (set these in Render dashboard)
      - key: B2_ACCESS_KEY_ID
        value: ""  # Your Backblaze B2 Application Key ID
      - key: B2_SECRET_ACCESS_KEY
        value: ""  # Your Backblaze B2 Application Key
      - key: B2_BUCKET
        value: ""  # Your Backblaze B2 bucket name (e.g., papzincrew-music-djpapzin)
      # CORS Configuration
      - key: ALLOWED_ORIGINS
        value: "https://papzincrew.netlify.app,http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173"
      - key: ALLOWED_ORIGIN_REGEX
        value: ""  # Optional regex for additional origins; defaults to localhost
      # Startup migration control (legacy bootstrap disabled by default)
      - key: DB_AUTO_MIGRATE
        value: "false"
      # Auth/JWT configuration
      - key: JWT_SECRET
        sync: false
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      # Optional: Logging and Performance
      - key: LOG_LEVEL
        value: "INFO"
      - key: ENABLE_UPLOAD_PRINTS
        value: "0"  # Set to 1 for debug upload logging
      - key: ENFORCE_B2_ONLY
        value: "1"  # Prod safety: refuse local filesystem fallback when B2 is unavailable
      - key: ENABLE_INPROCESS_RATE_LIMITING
        value: "1"
      - key: UPLOAD_RATE_LIMIT
        value: "20"
      - key: UPLOAD_RATE_LIMIT_WINDOW_SECONDS
        value: "60"
      - key: STREAM_RATE_LIMIT
        value: "120"
      - key: STREAM_RATE_LIMIT_WINDOW_SECONDS
        value: "60"
      - key: RATE_LIMIT_TRUSTED_PROXIES
        value: ""  # Leave empty unless traffic comes through a proxy you control that overwrites forwarded IP headers

  # Frontend Static Site (Note: This would be deployed separately on Netlify)
  # Keeping this for reference/alternative deployment option
  - type: static
    name: papzincrew-frontend
    rootDir: frontend/project
    plan: free
    buildCommand: npm ci && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        value: "http://13.48.27.192"
